<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KenanTech Precision Speedtest | 10s Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #06080c;
            --card: #10141d;
            --accent: #00f2ff;
            --purple: #7000ff;
            --text: #ffffff;
            --gray: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 0;
        }

        .container {
            width: 95%;
            max-width: 900px;
            background: var(--card);
            border-radius: 40px;
            padding: 40px;
            border: 1px solid #1e293b;
            box-shadow: 0 40px 80px rgba(0,0,0,0.7);
            text-align: center;
        }

        /* Network Info Bar */
        .network-bar {
            display: flex;
            justify-content: space-around;
            background: #0d1117;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 25px;
            border: 1px solid #21262d;
        }

        .info-item { text-align: left; }
        .info-item small { color: var(--gray); display: block; font-size: 0.75rem; text-transform: uppercase; }
        .info-item span { color: var(--accent); font-weight: bold; font-size: 1rem; }

        /* Speedometer UI */
        .gauge-section {
            position: relative;
            width: 320px;
            height: 320px;
            margin: 0 auto 30px;
        }

        .gauge-outline {
            width: 100%;
            height: 100%;
            border: 12px solid #1a1f2b;
            border-radius: 50%;
            position: absolute;
        }

        .gauge-progress {
            width: 100%;
            height: 100%;
            border: 12px solid transparent;
            border-top: 12px solid var(--accent);
            border-radius: 50%;
            position: absolute;
            transform: rotate(-45deg);
            transition: transform 0.3s ease-out;
        }

        .gauge-data {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
        }

        #speed-val {
            font-size: 6rem;
            font-weight: 900;
            margin: 0;
            background: linear-gradient(to bottom, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .timer-display {
            background: rgba(0, 242, 255, 0.1);
            color: var(--accent);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-bottom: 10px;
            display: inline-block;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .stat-card {
            background: #161b22;
            padding: 20px;
            border-radius: 20px;
            border: 2px solid transparent;
        }

        .stat-card.active { border-color: var(--accent); box-shadow: 0 0 15px rgba(0, 242, 255, 0.2); }
        .stat-card .label { color: var(--gray); font-size: 0.8rem; text-transform: uppercase; display: block; }
        .stat-card .val { font-size: 1.8rem; font-weight: 800; display: block; margin: 5px 0; }

        .go-btn {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 6px solid var(--accent);
            background: transparent;
            color: var(--accent);
            font-size: 1.8rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: -60px;
            position: relative;
            z-index: 5;
            transition: 0.3s;
        }

        .go-btn:hover:not(:disabled) { background: var(--accent); color: #000; box-shadow: 0 0 40px var(--accent); }
        .go-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        canvas#wave-chart { margin-top: 30px; height: 100px !important; }
    </style>
</head>
<body>

<div class="container">
    <div class="network-bar">
        <div class="info-item">
            <small><i class="fas fa-network-wired"></i> IP Adresi</small>
            <span id="user-ip">Yüklənir...</span>
        </div>
        <div class="info-item">
            <small><i class="fas fa-server"></i> Provayder</small>
            <span id="user-isp">Yoxlanılır...</span>
        </div>
    </div>

    <div id="timer-box" class="timer-display" style="visibility: hidden;">QALAN VAXT: <span id="secs">10</span>s</div>
    
    <div class="gauge-section">
        <div class="gauge-outline"></div>
        <div class="gauge-progress" id="gauge-ring"></div>
        <div class="gauge-data">
            <p id="stage" style="color: var(--gray); font-weight: bold; margin: 0;">HAZIR</p>
            <h1 id="speed-val">0</h1>
            <p style="color: var(--accent); font-weight: bold; margin: 0;">MBPS</p>
        </div>
    </div>

    <button class="go-btn" id="start-btn">GO</button>

    <div class="stats-grid">
        <div class="stat-card" id="ping-card">
            <span class="label">PING</span>
            <span class="val" id="res-ping">--</span><small>ms</small>
        </div>
        <div class="stat-card" id="down-card">
            <span class="label">DOWNLOAD</span>
            <span class="val" id="res-down">--</span><small>Mbps</small>
        </div>
        <div class="stat-card" id="up-card">
            <span class="label">UPLOAD</span>
            <span class="val" id="res-up">--</span><small>Mbps</small>
        </div>
    </div>

    <canvas id="wave-chart"></canvas>
</div>

<script>
    const TEST_FILE = "test_file.bin"; 
    let chart;

    // 1. IP və Provayderi avtomatik çəkən hissə
    async function getClientInfo() {
        try {
            const response = await fetch('https://ipapi.co/json/');
            const data = await response.json();
            document.getElementById('user-ip').innerText = data.ip;
            document.getElementById('user-isp').innerText = data.org || "Naməlum Provayder";
        } catch (e) {
            document.getElementById('user-ip').innerText = "127.0.0.1";
            document.getElementById('user-isp').innerText = "Naməlum";
        }
    }

    function initChart() {
        const ctx = document.getElementById('wave-chart').getContext('2d');
        chart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: Array(30).fill(''),
                datasets: [{
                    data: Array(30).fill(0),
                    borderColor: '#00f2ff',
                    borderWidth: 2,
                    tension: 0.4,
                    fill: true,
                    backgroundColor: 'rgba(0, 242, 255, 0.05)',
                    pointRadius: 0
                }]
            },
            options: { responsive: true, scales: { x: { display: false }, y: { display: false } }, plugins: { legend: false } }
        });
    }

    async function runTest(mode) {
        const duration = 10000; // 10 saniyə
        const startTime = performance.now();
        let totalBytes = 0;
        let lastMbps = 0;

        document.getElementById('timer-box').style.visibility = "visible";
        const card = document.getElementById(mode === 'down' ? 'down-card' : 'up-card');
        card.classList.add('active');

        while (performance.now() - startTime < duration) {
            const now = performance.now();
            const remaining = Math.ceil((duration - (now - startTime)) / 1000);
            document.getElementById('secs').innerText = remaining;

            try {
                if (mode === 'down') {
                    const response = await fetch(TEST_FILE + "?cb=" + now);
                    const reader = response.body.getReader();
                    while (true) {
                        const {done, value} = await reader.read();
                        if (done || (performance.now() - startTime >= duration)) break;
                        totalBytes += value.length;
                        let elapsed = (performance.now() - startTime) / 1000;
                        lastMbps = (totalBytes * 8 / (1024 * 1024) / elapsed).toFixed(2);
                        updateUI(lastMbps);
                    }
                } else {
                    const data = new Uint8Array(1024 * 1024);
                    await fetch('https://httpbin.org/post', { method: 'POST', body: data });
                    totalBytes += data.length;
                    let elapsed = (performance.now() - startTime) / 1000;
                    lastMbps = (totalBytes * 8 / (1024 * 1024) / elapsed).toFixed(2);
                    updateUI(lastMbps);
                }
            } catch (e) { break; }
        }

        card.classList.remove('active');
        document.getElementById('timer-box').style.visibility = "hidden";
        return lastMbps;
    }

    function updateUI(mbps) {
        document.getElementById('speed-val').innerText = Math.floor(mbps);
        document.getElementById('gauge-ring').style.transform = `rotate(${Math.min(mbps * 2 - 45, 220)}deg)`;
        chart.data.datasets[0].data.shift();
        chart.data.datasets[0].data.push(mbps);
        chart.update('none');
    }

    async function runPing() {
        let start = performance.now();
        await fetch(window.location.href + "?t=" + start, { method: 'HEAD' });
        return (performance.now() - start).toFixed(0);
    }

    document.getElementById('start-btn').onclick = async function() {
        this.disabled = true;
        document.getElementById('stage').innerText = "PING...";
        document.getElementById('res-ping').innerText = await runPing();

        document.getElementById('stage').innerText = "DOWNLOAD...";
        const dMbps = await runTest('down');
        document.getElementById('res-down').innerText = dMbps;

        document.getElementById('stage').innerText = "UPLOAD...";
        const uMbps = await runTest('up');
        document.getElementById('res-up').innerText = uMbps;

        document.getElementById('stage').innerText = "BİTDİ";
        document.getElementById('speed-val').innerText = Math.floor(dMbps);
        this.disabled = false;
    };

    window.onload = () => {
        getClientInfo();
        initChart();
    };
</script>
</body>
</html>
