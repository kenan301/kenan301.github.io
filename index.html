<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KənanLo internet saytı ve xıdmeti

    </title>
    <style>
        /* GÖYQURŞAĞI ANİMASİYASI */
        @keyframes rainbow {
            0% { color: #ff0000; border-color: #ff0000; }
            14% { color: #ff7f00; border-color: #ff7f00; }
            28% { color: #ffff00; border-color: #ffff00; }
            42% { color: #00ff00; border-color: #00ff00; }
            57% { color: #0000ff; border-color: #0000ff; }
            71% { color: #4b0082; border-color: #4b0082; }
            85% { color: #8b00ff; border-color: #8b00ff; }
            100% { color: #ff0000; border-color: #ff0000; }
        }

        @keyframes rainbow-bg {
            0% { background-color: #ff0000; }
            50% { background-color: #0000ff; }
            100% { background-color: #ff0000; }
        }

        body {
            background-color: #919c98;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }

        .container {
            background-color: #161616;
            padding: 30px;
            border-radius: 20px;
            display: inline-block;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
            width: 100%;
            max-width: 500px;
            margin-bottom: 30px;
            border: 1px solid #222;
        }

        /* Rəngli başlıqlar */
        h1, h2 { 
            animation: rainbow 5s infinite linear; 
            text-transform: uppercase;
            font-size: 28px;
        }

        .btn {
            display: block;
            width: 85%;
            margin: 20px auto;
            padding: 15px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 12px;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            color: white;
        }

        .youtube-btn { background-color: #ff0000; }
        .youtube-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px #ff0000; }

        .download-btn { background-color: #00aaff; }
        .download-btn:hover { transform: scale(1.05); box-shadow: 0 0 15px #00aaff; }

        /* 7 RƏNGLİ PLUS DÜYMƏSİ */
        .plus-btn {
            font-size: 60px;
            width: 120px;
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            cursor: pointer;
            border-radius: 50%;
            border: 4px dashed;
            animation: rainbow 3s infinite linear; /* Rənglər burada dönür */
            background: transparent;
            transition: 0.3s;
        }
        
        .plus-btn:hover {
            transform: rotate(90 deg);
            background: rgba(255, 255, 255, 0.1);
        }

        #sendBtn {
            background: #fff;
            color: #000;
            font-size: 18px;
            margin-top: 20px;
        }

        #sendBtn:hover {
            background: #00ff00;
            color: #000;
        }

        #result {
            background: #000;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            border: 2px solid;
            animation: rainbow 5s infinite linear;
        }

        #codeDisplay {
            font-size: 45px;
            font-weight: bold;
            letter-spacing: 10px;
            margin: 10px 0;
        }

        #qrcode {
            background: white;
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>KenanLo ınternet transfer system xoş geldiniz</h1>
        <p>kenanLo və Sürətli Transfer Mərkəzi</p>

        <a href="https://www.youtube.com/@KenanLo-Minecraft" target="_blank" class="btn youtube-btn">
            YouTube Kanalım
        </a>
    </div>

    <div class="container">
        <h2>gönder fayıl işim var ver Transfer edim</h2>
        
        <div class="plus-btn" onclick="document.getElementById('fileInput').click()">
            +
        </div>
        
        <input type="file" id="fileInput" style="display:none" onchange="document.getElementById('fileNameText').innerText = 'Seçildi: ' + this.files[0].name">
        <p id="fileNameText" style="color: #00ff00;">Fayl seçilməyib</p>
        
        <button id="sendBtn" class="btn" onclick="startTransfer()">GÖNDƏR</button>

        <div id="result" style="display:none;">
            <p>Sənin 6 rəqəmli kodun:</p>
            <div id="codeDisplay"></div>
            <div id="qrcode"></div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script>
        function startTransfer() {
            const fileInput = document.getElementById('fileInput');
            if (fileInput.files.length === 0) return alert("Fayl seç!");

            const btn = document.getElementById('sendBtn');
            btn.innerText = "GÖNDƏRİLİR...";
            btn.disabled = true;

            setTimeout(() => {
                const formData = new FormData();
                formData.append('file', fileInput.files[0]);

                fetch('/upload', { method: 'POST', body: formData })
                .then(res => res.json())
                .then(data => {
                    document.getElementById('result').style.display = 'block';
                    document.getElementById('codeDisplay').innerText = data.code;
                    btn.innerText = "BİTDİ!";
                    
                    document.getElementById('qrcode').innerHTML = "";
                    new QRCode(document.getElementById("qrcode"), {
                        text: window.location.origin + "/download/" + data.code,
                        width: 150,
                        height: 150
                    });
                });
            }, 2000);
        }
    </script>
</body>
</html>
<a href="SENİN_GOOGLE_DRIVE_LİNKİN_BURA" target="_blank" class="btn download-btn">
    Premiere Pro Set-up.exe Yüklə
</a>
<script src="main.js"></script>
</body>
</html>
